version: '3.8'

services:
  backend:
    build: .
    container_name: ndt_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights
    environment:
      - API_URL=http://localhost:8000
      - MONGODB_URI=mcp://mongodb.partner.local
    env_file:
      - .env
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    container_name: ndt_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    env_file:
      - .env
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
